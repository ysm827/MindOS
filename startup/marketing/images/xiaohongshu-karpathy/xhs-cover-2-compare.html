<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    background: #1a1a1a;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    color: #f5f0eb;
  }
  .container {
    padding: 60px 56px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .header {
    text-align: center;
    margin-bottom: 50px;
  }
  .header h1 {
    font-size: 58px;
    font-weight: 900;
    margin-bottom: 16px;
  }
  .header .sub {
    font-size: 30px;
    color: #c8873a;
    font-weight: 700;
  }
  .divider {
    width: 100%;
    height: 2px;
    background: #333;
    margin-bottom: 44px;
  }
  .table-header {
    display: flex;
    margin-bottom: 24px;
    padding: 0 20px;
  }
  .table-header .col {
    flex: 1;
    font-size: 30px;
    font-weight: 700;
    color: #999;
    text-align: center;
  }
  .table-header .col:first-child { text-align: left; }
  .row {
    display: flex;
    align-items: center;
    background: #252525;
    border-radius: 16px;
    padding: 28px 28px;
    margin-bottom: 16px;
  }
  .row .label {
    flex: 0 0 200px;
    font-size: 30px;
    color: #999;
    font-weight: 700;
  }
  .row .karpathy {
    flex: 1;
    font-size: 28px;
    color: #e55;
    text-align: center;
  }
  .row .karpathy::before { content: '✗ '; font-weight: 900; }
  .row .mindos {
    flex: 1;
    font-size: 28px;
    color: #5dba5d;
    text-align: center;
    font-weight: 700;
  }
  .row .mindos::before { content: '✓ '; font-weight: 900; }
  .row-killer {
    background: linear-gradient(135deg, #c8873a22 0%, #c8873a11 100%);
    border: 2px solid #c8873a;
  }
  .row-killer .label { color: #c8873a; }
  .row-killer .mindos { color: #c8873a; }
  .bottom-section {
    margin-top: auto;
    text-align: center;
  }
  .bottom-section .killer-badge {
    display: inline-block;
    background: #c8873a;
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    padding: 14px 36px;
    border-radius: 40px;
    margin-bottom: 24px;
  }
  .bottom-section .desc {
    font-size: 30px;
    color: #aaa;
    line-height: 1.6;
  }
  .bottom-section .desc strong {
    color: #f5f0eb;
  }
  .footer {
    margin-top: 36px;
    text-align: center;
    font-size: 26px;
    color: #555;
  }
  .footer span { color: #c8873a; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Karpathy 手动 vs 自动</h1>
    <div class="sub">逐项对比</div>
  </div>
  <div class="divider"></div>
  <div class="table-header">
    <div class="col"></div>
    <div class="col">Karpathy</div>
    <div class="col">MindOS</div>
  </div>
  <div class="row">
    <div class="label">导入数据</div>
    <div class="karpathy">手建 raw/ 目录</div>
    <div class="mindos">一键导入笔记</div>
  </div>
  <div class="row">
    <div class="label">知识编译</div>
    <div class="karpathy">手动触发编译</div>
    <div class="mindos">聊天自动沉淀</div>
  </div>
  <div class="row">
    <div class="label">前端界面</div>
    <div class="karpathy">需学 Obsidian</div>
    <div class="mindos">内置界面</div>
  </div>
  <div class="row">
    <div class="label">健康检查</div>
    <div class="karpathy">手动检查</div>
    <div class="mindos">自动矛盾检测</div>
  </div>
  <div class="row row-killer">
    <div class="label">多 AI 共享</div>
    <div class="karpathy">单个 LLM</div>
    <div class="mindos">所有 AI 共享</div>
  </div>
  <div class="bottom-section">
    <div class="killer-badge">杀手功能：多 AI 共享知识库</div>
    <div class="desc">
      Claude、Cursor、ChatGPT、Gemini<br>
      <strong>纠正一次错误，所有 AI 都记住</strong>
    </div>
  </div>
  <div class="footer">
    <span>MindOS</span> · 开源免费 · 数据全在本地 · GitHub: GeminiLight/MindOS
  </div>
</div>
</body>
</html>
