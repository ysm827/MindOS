<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px;
    height: 1440px;
    background: #ffffff;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }
  .container {
    padding: 60px 56px;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .headline {
    font-size: 78px;
    font-weight: 900;
    line-height: 1.25;
    color: #1a1a1a;
    margin-bottom: 40px;
  }
  .headline .highlight {
    color: #c8873a;
  }
  .divider {
    width: 80px;
    height: 5px;
    background: #c8873a;
    margin-bottom: 36px;
  }
  .subtitle {
    font-size: 34px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 44px;
  }
  .compare-section {
    background: #f7f5f2;
    border-radius: 20px;
    padding: 36px 40px;
    margin-bottom: 40px;
  }
  .compare-row {
    display: flex;
    align-items: center;
    font-size: 30px;
    line-height: 1.5;
    margin-bottom: 14px;
    color: #333;
  }
  .compare-row:last-child { margin-bottom: 0; }
  .compare-row .icon { margin-right: 12px; font-size: 28px; font-family: 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', sans-serif; }
  .compare-row .x { color: #e55; font-weight: 900; font-size: 32px; margin-right: 12px; }
  .compare-row .check { color: #5dba5d; font-weight: 900; font-size: 32px; margin-right: 12px; }
  .compare-row .arrow { margin: 0 14px; color: #999; }
  .compare-row .good { color: #c8873a; font-weight: 700; }
  .ui-preview {
    flex: 1;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
    border: 2px solid #e8e0d8;
    margin-bottom: 0;
    position: relative;
  }
  .ui-preview img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top left;
    display: block;
  }
  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 24px;
    border-top: 2px solid #eee;
  }
  .footer-left {
    font-size: 28px;
    color: #999;
  }
  .footer-left span { color: #c8873a; font-weight: 700; }
  .footer-right {
    font-size: 26px;
    color: #bbb;
  }
</style>
</head>
<body>
<div class="container">
  <div class="headline">
    Karpathy的AI知识库<br>
    <span class="highlight">一个开源软件搞定了!</span>
  </div>
  <div class="divider"></div>
  <div class="subtitle">
    AI 自动编译你的知识库<br>
    告诉一个 AI，所有 Agent 都知道
  </div>
  <div class="compare-section">
    <div class="compare-row">
      <span class="x">✗</span> 手建目录
      <span class="arrow">→</span>
      <span class="check">✓</span> <span class="good">一键导入笔记</span>
    </div>
    <div class="compare-row">
      <span class="x">✗</span> 手动编译
      <span class="arrow">→</span>
      <span class="check">✓</span> <span class="good">AI 自动记住偏好</span>
    </div>
    <div class="compare-row">
      <span class="x">✗</span> 学 Obsidian
      <span class="arrow">→</span>
      <span class="check">✓</span> <span class="good">内置界面，打开就用</span>
    </div>
    <div class="compare-row">
      <span class="x">✗</span> 单个 LLM
      <span class="arrow">→</span>
      <span class="check">✓</span> <span class="good">所有 AI 共享知识库</span>
    </div>
  </div>
  <div class="ui-preview">
    <img src="file:///tmp/xhs-cover-3-homepage.png" alt="MindOS UI">
  </div>
  <div class="footer">
    <div class="footer-left"><span>MindOS</span> · 开源免费 · 数据全在本地</div>
    <div class="footer-right">GitHub: GeminiLight/MindOS</div>
  </div>
</div>
</body>
</html>
