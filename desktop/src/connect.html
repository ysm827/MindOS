<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindOS</title>
  <!-- Sync theme + document language before first paint (avoids light/dark or zh/en flash). -->
  <script>
(function () {
  document.documentElement.classList.add('connect-hydrating');
  function systemLangIsZh() {
    try { return (navigator.language || '').toLowerCase().startsWith('zh'); } catch (_) { return false; }
  }
  try {
    var th = localStorage.getItem('mindos-connect-theme');
    if (th === 'light') document.documentElement.setAttribute('data-theme', 'light');
    else if (th === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    else document.documentElement.removeAttribute('data-theme');

    var lg = localStorage.getItem('mindos-lang');
    var resolved;
    if (lg === 'zh') resolved = 'zh';
    else if (lg === 'en') resolved = 'en';
    else resolved = systemLangIsZh() ? 'zh' : 'en';
    document.documentElement.lang = resolved === 'zh' ? 'zh-CN' : 'en';
  } catch (_) { /* file:// or sandbox */ }
})();
  </script>
  <style>
    /* ── Design tokens: Light Mode (default) ── */
    :root {
      --background: #faf9f7;
      --foreground: #1c1a17;
      --card: #ffffff;
      --card-hover: #f5f3f0;
      --border: rgba(28, 26, 23, 0.10);
      --muted-foreground: #8a8275;
      --amber: #c8873a;
      --amber-dim: rgba(200, 135, 58, 0.12);
      --amber-foreground: #ffffff;
      --success: #2d8a3e;
      --error: #c85050;
      --radius: 0.75rem;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
      color-scheme: light dark;
    }

    /* ── Design tokens: Dark Mode ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #131210;
        --foreground: #e8e4dc;
        --card: #1c1a17;
        --card-hover: #252320;
        --border: rgba(232, 228, 220, 0.08);
        --muted-foreground: #8a8275;
        --amber: #d4954a;
        --amber-dim: rgba(212, 149, 74, 0.20);
        --amber-foreground: #131210;
        --success: #7aad80;
        --error: #c85050;
        --shadow: 0 1px 3px rgba(0,0,0,0.3);
      }
    }

    /* Forced theme (overrides system). Same tokens as :root / dark media above. */
    html[data-theme="light"] {
      --background: #faf9f7;
      --foreground: #1c1a17;
      --card: #ffffff;
      --card-hover: #f5f3f0;
      --border: rgba(28, 26, 23, 0.10);
      --muted-foreground: #8a8275;
      --amber: #c8873a;
      --amber-dim: rgba(200, 135, 58, 0.12);
      --amber-foreground: #ffffff;
      --success: #2d8a3e;
      --error: #c85050;
      --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }
    html[data-theme="dark"] {
      --background: #131210;
      --foreground: #e8e4dc;
      --card: #1c1a17;
      --card-hover: #252320;
      --border: rgba(232, 228, 220, 0.08);
      --muted-foreground: #8a8275;
      --amber: #d4954a;
      --amber-dim: rgba(212, 149, 74, 0.20);
      --amber-foreground: #131210;
      --success: #7aad80;
      --error: #c85050;
      --shadow: 0 1px 3px rgba(0,0,0,0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html.connect-hydrating body {
      opacity: 0;
    }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      transition: opacity 0.12s ease-out;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    /* ── Brand ── */
    .brand {
      text-align: center;
      margin-bottom: 28px;
    }
    .brand h1 {
      font-size: 26px;
      font-weight: 700;
      color: var(--amber);
      font-family: 'Lora', Georgia, serif;
      letter-spacing: -0.01em;
    }
    .brand p {
      font-size: 13px;
      color: var(--muted-foreground);
      margin-top: 4px;
    }

    /* ── Mode Cards ── */
    .mode-selection { text-align: center; }
    .mode-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 20px 0;
    }
    .mode-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: left;
      box-shadow: var(--shadow);
    }
    .mode-card:hover {
      border-color: var(--amber);
      background: var(--amber-dim);
    }
    .mode-card:active {
      transform: scale(0.98);
    }
    .mode-card:focus-visible {
      border-color: var(--amber);
      outline: none;
      box-shadow: 0 0 0 3px rgba(200, 135, 58, 0.3);
    }
    .mode-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: var(--background);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .mode-info h3 {
      font-size: 15px;
      font-weight: 600;
      color: var(--foreground);
      margin-bottom: 2px;
    }
    .mode-info p {
      font-size: 12px;
      color: var(--muted-foreground);
      line-height: 1.4;
    }

    /* ── Recent servers ── */
    .recent { margin-bottom: 16px; }
    .recent-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted-foreground);
      margin-bottom: 6px;
    }
    .recent-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      background: var(--card);
    }
    .recent-item:hover {
      border-color: var(--amber);
      background: var(--amber-dim);
    }
    .recent-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
    }
    .recent-dot.online { background: var(--success); }
    .recent-info { flex: 1; min-width: 0; }
    .recent-label-text {
      font-size: 13px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .recent-address {
      font-size: 11px;
      color: var(--muted-foreground);
      font-family: ui-monospace, 'SF Mono', monospace;
    }
    .recent-forget {
      font-size: 11px; color: var(--muted-foreground);
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .recent-forget:hover {
      color: var(--error);
      background: rgba(200,80,80,0.10);
    }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0; color: var(--muted-foreground); font-size: 11px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* ── Form ── */
    label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--muted-foreground); margin-bottom: 5px;
    }
    input {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card); color: var(--foreground);
      font-size: 14px; font-family: ui-monospace, 'SF Mono', monospace;
      outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--amber); }
    input::placeholder { color: var(--muted-foreground); opacity: 0.5; }
    .field { margin-bottom: 12px; }

    .test-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card); color: var(--foreground);
      font-size: 13px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      margin-top: 6px;
    }
    .test-btn:hover { border-color: var(--amber); }
    .test-btn:disabled { opacity: 0.5; cursor: default; }

    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; border-radius: var(--radius);
      font-size: 13px; margin: 10px 0;
      background: var(--amber-dim);
    }
    .status-bar.success { color: var(--success); }
    .status-bar.error { color: var(--error); }
    .status-bar.info { color: var(--muted-foreground); }

    .connect-btn {
      width: 100%; padding: 11px; border: none;
      border-radius: var(--radius);
      background: var(--amber); color: var(--amber-foreground);
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s; margin-top: 6px;
    }
    .connect-btn:hover { opacity: 0.9; }
    .connect-btn:disabled { opacity: 0.4; cursor: default; }

    .hint {
      margin-top: 14px; font-size: 12px;
      color: var(--muted-foreground); line-height: 1.5;
    }
    .hint strong { color: var(--foreground); font-weight: 500; }

    .switch-mode {
      display: block; width: 100%; text-align: center;
      margin-top: 16px; padding: 9px; font-size: 13px;
      color: var(--muted-foreground); background: none;
      border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; transition: color 0.15s, border-color 0.15s;
    }
    .switch-mode:hover {
      color: var(--foreground);
      border-color: var(--muted-foreground);
    }

    /* ── Theme + language icon toolbar ── */
    .connect-toolbar {
      position: absolute; top: 12px; right: 12px;
      display: flex; gap: 6px; align-items: center;
    }
    .icon-btn {
      width: 36px; height: 36px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--card); color: var(--foreground);
      cursor: pointer; padding: 0;
      transition: border-color 0.15s, background 0.15s;
    }
    .icon-btn:hover {
      border-color: var(--amber);
      background: var(--card-hover);
    }
    .icon-btn:focus { outline: none; }
    .icon-btn:focus-visible {
      box-shadow: 0 0 0 2px var(--background), 0 0 0 4px var(--amber);
    }
    .icon-btn svg {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }
    .lang-glyph {
      font-size: 14px; font-weight: 600;
      line-height: 1;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    /* ── Setup helper ── */
    .setup-btn {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 10px; padding: 9px 18px;
      border: 1px solid var(--amber); border-radius: var(--radius);
      background: var(--amber-dim); color: var(--amber);
      font-size: 13px; font-weight: 500; cursor: pointer;
      transition: all 0.15s;
    }
    .setup-btn:hover {
      background: var(--amber);
      color: var(--amber-foreground);
    }
    .setup-section {
      margin-top: 16px; padding: 14px;
      border: 1px dashed var(--border); border-radius: var(--radius);
      background: var(--card);
    }
    .setup-section h4 { font-size: 14px; color: var(--foreground); margin-bottom: 10px; }
    .setup-section p { font-size: 12px; color: var(--muted-foreground); margin-bottom: 6px; line-height: 1.5; }
    .setup-section code {
      font-family: ui-monospace, 'SF Mono', monospace;
      background: var(--background); padding: 2px 6px; border-radius: 4px; font-size: 11px;
    }
    .install-progress {
      display: flex; align-items: center; gap: 8px;
      margin-top: 10px; padding: 9px 12px;
      background: var(--card); border-radius: var(--radius);
      font-size: 13px; color: var(--muted-foreground);
      border: 1px solid var(--border);
    }
    .install-progress.success {
      color: var(--success); border-color: var(--success);
      background: rgba(45, 138, 62, 0.06);
    }
    .install-progress.error {
      color: var(--error); border-color: var(--error);
      background: rgba(200, 80, 80, 0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .install-progress.success { background: rgba(122, 173, 128, 0.1); }
      :root:not([data-theme="light"]) .install-progress.error { background: rgba(200, 80, 80, 0.1); }
    }
    html[data-theme="dark"] .install-progress.success { background: rgba(122, 173, 128, 0.1); }
    html[data-theme="dark"] .install-progress.error { background: rgba(200, 80, 80, 0.1); }
    html[data-theme="light"] .install-progress.success { background: rgba(45, 138, 62, 0.06); }
    html[data-theme="light"] .install-progress.error { background: rgba(200, 80, 80, 0.06); }

    .hidden { display: none !important; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--amber-dim); border-top-color: var(--amber);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Connection tabs ── */
    .conn-tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 3px;
    }
    .conn-tab {
      flex: 1; padding: 7px 0; text-align: center;
      font-size: 12px; font-weight: 500; border: none;
      background: transparent; color: var(--muted-foreground);
      border-radius: 8px; cursor: pointer; transition: all 0.15s;
    }
    .conn-tab:hover { color: var(--foreground); }
    .conn-tab.active { background: var(--amber); color: var(--amber-foreground); }

    .ssh-note {
      font-size: 11px; color: var(--muted-foreground);
      margin-top: 8px; line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="connect-toolbar" role="toolbar" aria-label="Appearance">
    <button type="button" class="icon-btn" id="btn-theme" aria-label="Theme"></button>
    <button type="button" class="icon-btn" id="btn-lang" aria-label="Language"></button>
  </div>

  <div class="container">
    <!-- Mode Selection Screen -->
    <div id="mode-selection" class="mode-selection">
      <div class="brand">
        <h1>∞ MindOS</h1>
        <p data-i18n="subtitle"></p>
      </div>

      <div class="mode-cards">
        <!-- Events bound by JS via querySelectorAll('.mode-card') -->
        <div class="mode-card" role="button" tabindex="0" aria-label="Local mode">
          <div class="mode-icon">⚡</div>
          <div class="mode-info">
            <h3 data-i18n="localTitle"></h3>
            <p data-i18n="localDesc"></p>
          </div>
        </div>

        <div class="mode-card" role="button" tabindex="0" aria-label="Remote mode">
          <div class="mode-icon">🌐</div>
          <div class="mode-info">
            <h3 data-i18n="remoteTitle"></h3>
            <p data-i18n="remoteDesc"></p>
          </div>
        </div>
      </div>

      <!-- Setup section for local mode — shown when MindOS CLI not found -->
      <div class="setup-section" id="local-setup" style="display:none;">
        <h4 data-i18n="missingCli"></h4>
        <p data-i18n="missingCliDesc"></p>
        <button class="setup-btn" id="install-btn" data-i18n="installBtn"></button>
        <div id="install-status" class="hidden"></div>
        <button class="setup-btn" id="retry-btn" data-i18n="retryLocal" style="display:none; margin-top:10px;"></button>
      </div>
    </div>

    <!-- Remote Connection Screen (hidden initially) -->
    <div id="remote-screen" class="hidden">
      <div class="brand">
        <h1>∞ MindOS</h1>
        <p data-i18n="connectServer"></p>
      </div>

      <!-- Connection method tabs -->
      <div class="conn-tabs">
        <button class="conn-tab active" id="tab-ssh" data-i18n="sshTab"></button>
        <button class="conn-tab" id="tab-http" data-i18n="httpTab"></button>
      </div>

      <!-- SSH Panel -->
      <div id="ssh-panel">
        <div class="field">
          <label data-i18n="sshHost"></label>
          <input id="ssh-host-input" type="text" placeholder="user@hostname" autocomplete="off" spellcheck="false" list="ssh-host-list" data-i18n-placeholder="sshSelectHost" />
          <datalist id="ssh-host-list"></datalist>
        </div>
        <div class="field">
          <label data-i18n="sshPort"></label>
          <input id="ssh-port" type="number" value="3456" min="1" max="65535" style="font-family:ui-monospace,'SF Mono',monospace" />
        </div>
        <div id="ssh-status" class="status-bar hidden"></div>
        <button id="ssh-connect-btn" class="connect-btn" data-i18n="sshConnect"></button>
        <p class="ssh-note" id="ssh-note"></p>
      </div>

      <!-- HTTP Panel (hidden when SSH tab active) -->
      <div id="http-panel" class="hidden">
        <!-- Recent servers -->
        <div id="recent-section" class="recent hidden">
          <div class="recent-label" data-i18n="recentServers"></div>
          <div id="recent-list"></div>
        </div>

        <div id="divider" class="divider hidden"><span data-i18n="orConnect"></span></div>

        <!-- Address input -->
        <div class="field">
          <label for="address" data-i18n="serverAddress"></label>
          <input id="address" type="text" placeholder="http://192.168.1.100:3456" autocomplete="off" spellcheck="false" />
          <button id="test-btn" class="test-btn" data-i18n="testConnection"></button>
        </div>

        <!-- Status -->
        <div id="status" class="status-bar hidden"></div>

        <!-- Password (shown when authRequired) -->
        <div id="password-section" class="field hidden">
          <label for="password" data-i18n="password"></label>
          <input id="password" type="password" data-i18n-placeholder="enterPassword" placeholder="" />
        </div>

        <!-- Connect button -->
        <button id="connect-btn" class="connect-btn hidden" disabled data-i18n="connect"></button>

        <!-- Hint -->
        <div class="hint" data-i18n="hint"></div>
      </div>

      <!-- Switch to local -->
      <button class="switch-mode" data-i18n="switchLocal"></button>
    </div>
  </div>

  <!-- If connect-renderer.js fails to load or throws before init, still show UI (avoid stuck opacity:0). -->
  <script>
    setTimeout(function () {
      document.documentElement.classList.remove('connect-hydrating');
    }, 3500);
  </script>
  <script src="../dist-electron/renderer/connect-renderer.js"></script>
</body>
</html>
