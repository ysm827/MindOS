<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindOS</title>
  <style>
    /* Design system tokens (dark mode) — mirrors app/app/globals.css .dark */
    :root {
      --background: #131210;
      --foreground: #e8e4dc;
      --muted-foreground: #8a8275;
      --amber: #d4954a;
      --amber-dim: rgba(212, 149, 74, 0.20);
      --radius: 0.5rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--background);
      color: var(--foreground);
      font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    }
    .logo {
      font-size: 48px;
      font-weight: 700;
      color: var(--amber);
      margin-bottom: 16px;
      font-family: 'Lora', Georgia, serif;
    }
    .tagline {
      font-size: 14px;
      color: var(--muted-foreground);
      margin-bottom: 40px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--amber-dim);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status {
      margin-top: 16px;
      font-size: 12px;
      color: var(--muted-foreground);
    }
  </style>
</head>
<body>
  <div class="logo">∞ MindOS</div>
  <p class="tagline">Human Thinks Here, Agent Acts There.</p>
  <div class="spinner"></div>
  <p class="status" id="status">Starting services...</p>
</body>
</html>
