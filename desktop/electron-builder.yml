appId: com.mindos.desktop
productName: MindOS
copyright: Copyright © 2026 MindOS

directories:
  buildResources: src/icons
  output: dist

files:
  - dist-electron/**/*
  - src/connect.html
  - src/splash.html
  - src/icons/**/*
  - "!**/node_modules/.cache"
  - "!**/.turbo"
  - "!**/__tests__/**"
  - "!**/test/**"

mac:
  category: public.app-category.productivity
  icon: src/icons/icon.png
  target:
    - target: zip
      arch:
        - arm64
        - x64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null

asar: true
# No asarUnpack needed — loadFile() reads from asar directly,
# and keeping HTML inside asar preserves relative script paths.

win:
  icon: src/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: src/icons/icon.png
  target:
    - AppImage
    - deb
  category: Office

publish:
  provider: github
  owner: GeminiLight
  repo: MindOS
