appId: com.mindos.desktop
productName: MindOS
copyright: Copyright © 2026 MindOS

directories:
  buildResources: src/icons
  output: dist

files:
  - dist-electron/**/*
  - src/connect.html
  - src/splash.html
  - src/icons/**/*
  - "!**/node_modules/.cache"
  - "!**/.turbo"
  - "!**/__tests__/**"
  - "!**/test/**"

mac:
  category: public.app-category.productivity
  icon: src/icons/icon.png
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  # Ad-Hoc signing: allows the app to run on Apple Silicon Macs
  # without a paid developer account. Users will still see Gatekeeper
  # warnings, but the app won't crash with "Killed: 9"
  # To disable signing completely, use: identity: null
  identity: '-'
  hardenedRuntime: true
  gatekeeperAssess: false

asar: true
# macOS Chromium often returns ERR_FAILED for file:// pages loaded from inside app.asar; mirror these out.
asarUnpack:
  - "**/src/connect.html"
  - "**/src/splash.html"
  - "**/dist-electron/preload/**"
  - "**/dist-electron/renderer/connect-renderer.js"
# Bundled MindOS: populate `resources/mindos-runtime` via `npm run prepare-mindos-runtime` before dist — see desktop/resources/mindos-runtime/README.md

extraResources:
  - from: resources/mindos-runtime
    to: mindos-runtime

win:
  icon: src/icons/icon.ico
  target:
    - target: nsis
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  icon: src/icons/icon.png
  target:
    - AppImage
    - deb
  category: Office

publish:
  provider: github
  owner: GeminiLight
  repo: MindOS
