# MindOS — 本地 / 服务器一键起容器
# 详见根目录 DOCKER.md（安全、反代、升级）
#
# 首次初始化（交互，与 compose 使用同一卷）：
#   docker compose run mindos mindos onboard
#   （若提示 unknown flag: --rm，说明未装 compose 插件，见 DOCKER.md / TROUBLESHOOTING.md）
#   旧式独立命令：docker-compose run --rm mindos mindos onboard
#   mindRoot 填容器内路径 /data/mind（对应宿主默认 ~/MindOS/mind）
#
# 知识库宿主目录默认 ${HOME}/MindOS/mind；可覆盖：
#   export MINDOS_KB_HOST=/your/path && docker compose up -d
#
# 日常启动：
#   docker compose up -d
#
# 追 npm 最新并重建：
#   docker compose build --no-cache && docker compose up -d

services:
  mindos:
    image: mindos:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MINDOS_VERSION: latest
    restart: unless-stopped
    stop_grace_period: 45s
    ports:
      # 生产建议改为 "127.0.0.1:3456:3456" 仅本机，再由反代对外
      - "3456:3456"
      - "8781:8781"
    environment:
      MINDOS_WEB_PORT: "3456"
      MINDOS_MCP_PORT: "8781"
    volumes:
      - mindos_state:/root/.mindos
      # 宿主 ~/MindOS/mind → 容器 /data/mind（onboard 里 mindRoot 填 /data/mind）
      - ${MINDOS_KB_HOST:-${HOME}/MindOS/mind}:/data/mind
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3456/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 600s

volumes:
  mindos_state:
