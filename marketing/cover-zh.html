<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书封面</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0906;
    --card-bg: #0a0906;
    --card-surface: #1c1a17;
    --card-border: rgba(232, 228, 220, 0.06);
    --card-border-subtle: rgba(232, 228, 220, 0.04);
    --text-primary: #e8e4dc;
    --text-secondary: #8a8275;
    --text-muted: #6a6560;
    --text-faint: #5a5750;
    --accent: #d4954a;
    --accent-bg: rgba(212, 149, 74, 0.1);
    --accent-glow: rgba(212, 149, 74, 0.06);
    --danger: #e06c6c;
    --danger-bg: rgba(224, 108, 108, 0.1);
    --danger-border: rgba(224, 108, 108, 0.2);
    --danger-tag-bg: rgba(224, 108, 108, 0.15);
    --danger-tag-border: rgba(224, 108, 108, 0.25);
    --divider: rgba(232, 228, 220, 0.08);
  }

  body.light {
    --bg: #f8f6f2;
    --card-bg: #f8f6f2;
    --card-surface: #ffffff;
    --card-border: rgba(60, 50, 30, 0.08);
    --card-border-subtle: rgba(60, 50, 30, 0.06);
    --text-primary: #1a1815;
    --text-secondary: #6b6358;
    --text-muted: #8a8275;
    --text-faint: #a09888;
    --accent: #c07d2f;
    --accent-bg: rgba(192, 125, 47, 0.1);
    --accent-glow: rgba(192, 125, 47, 0.06);
    --danger: #d04848;
    --danger-bg: rgba(208, 72, 72, 0.08);
    --danger-border: rgba(208, 72, 72, 0.15);
    --danger-tag-bg: rgba(208, 72, 72, 0.1);
    --danger-tag-border: rgba(208, 72, 72, 0.2);
    --divider: rgba(60, 50, 30, 0.1);
  }

  body {
    font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px;
  }

  .card {
    width: 1080px;
    height: 1440px;
    background: var(--card-bg);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 48px 64px 64px;
  }

  .card::before {
    content: '';
    position: absolute;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
  }

  /* Top */
  .scene-label {
    font-size: 32px;
    font-weight: 500;
    color: var(--text-secondary);
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 0.08em;
  }

  /* Meeting note card */
  .note-card {
    background: var(--card-surface);
    border-radius: 16px;
    padding: 24px 28px;
    border: 1px solid var(--card-border);
    border-left: 4px solid var(--accent);
    margin-bottom: 12px;
    position: relative;
  }

  .note-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .note-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    color: var(--text-secondary);
  }

  .note-tag {
    padding: 3px 12px;
    border-radius: 6px;
    font-size: 22px;
    font-family: 'JetBrains Mono', monospace;
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 500;
  }

  .copy-count {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-radius: 8px;
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
  }

  .copy-count svg {
    width: 24px; height: 24px;
    stroke: var(--danger);
    fill: none;
    stroke-width: 2;
  }

  .copy-count span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    color: var(--danger);
  }

  .note-text {
    font-size: 32px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.6;
  }

  .note-text .note-title {
    font-size: 28px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .note-text .hl {
    color: var(--accent);
  }

  /* Pain section */
  .pain-section {
    margin-top: 20px;
    margin-bottom: 24px;
  }

  .pain-label {
    font-size: 30px;
    color: var(--danger);
    font-weight: 700;
    margin-bottom: 20px;
  }

  .pain-item {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 14px 24px;
    background: var(--card-surface);
    border-radius: 14px;
    margin-bottom: 8px;
    border: 1px solid var(--card-border-subtle);
  }

  .pain-logo {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    border-radius: 8px;
  }

  .pain-tool {
    font-size: 30px;
    font-weight: 600;
    color: var(--text-primary);
    min-width: 200px;
  }

  .repeat-tag {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 6px;
    font-size: 26px;
    font-weight: 700;
    background: var(--danger-tag-bg);
    color: var(--danger);
    border: 1px solid var(--danger-tag-border);
  }

  .pain-desc {
    font-size: 26px;
    color: var(--text-muted);
    margin-left: 4px;
  }

  /* Divider */
  .divider {
    width: 100%;
    height: 1px;
    background: var(--divider);
    margin: 4px 0 24px;
  }

  /* Bottom CTA */
  .bottom {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .solution-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .solution-logo {
    width: 80px;
    height: 80px;
  }

  .solution-name {
    font-size: 66px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Inter', sans-serif;
  }

  .solution-sep {
    font-size: 44px;
    color: var(--text-faint);
  }

  .solution-desc {
    font-size: 44px;
    font-weight: 500;
    color: var(--text-secondary);
  }

  .opensource-tag {
    display: inline-block;
    padding: 6px 20px;
    border-radius: 10px;
    font-size: 40px;
    font-weight: 700;
    background: var(--accent-bg);
    color: var(--accent);
    border: 2px solid var(--accent);
    letter-spacing: 0.05em;
  }

  .bottom-main {
    font-size: 88px;
    font-weight: 900;
    color: var(--text-primary);
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .bottom-main .accent {
    color: var(--accent);
  }

  .bottom-sub {
    font-size: 40px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .swipe-hint {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 20px;
  }

  .swipe-hint span {
    font-size: 26px;
    color: var(--text-faint);
  }

  .swipe-arrow {
    display: flex;
    gap: 3px;
  }

  .swipe-arrow i {
    display: block;
    width: 8px; height: 8px;
    border-right: 2px solid var(--accent);
    border-top: 2px solid var(--accent);
    transform: rotate(45deg);
    opacity: 0.3;
  }

  .swipe-arrow i:nth-child(2) { opacity: 0.55; }
  .swipe-arrow i:nth-child(3) { opacity: 0.85; }
</style>
</head>
