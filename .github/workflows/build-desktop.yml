name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: false
      tag:
        description: 'Tag to build (for release name, e.g. desktop-v0.1.0)'
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: universal
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install all dependencies (app + mcp + desktop)
      - name: Install dependencies
        run: |
          cd app && npm install && cd ..
          cd mcp && npm install && cd ..
          cd desktop && npm install

      # Build Next.js standalone (required by prepare-mindos-runtime)
      - name: Build MindOS (Next.js standalone)
        run: |
          node scripts/gen-renderer-index.js
          cd app && npx next build

      # Build Electron (compile TS → JS)
      - name: Build Electron
        run: cd desktop && npm run build

      # Bundle MindOS runtime into desktop resources
      - name: Prepare bundled runtime
        run: cd desktop && npm run prepare-mindos-runtime

      # Get version (needed for tag name)
      - name: Get version
        id: version
        run: |
          VERSION=$(cd desktop && node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      # Package for the target platform.
      # --publish always: electron-builder generates latest-mac.yml / latest-linux.yml / latest.yml
      # and uploads to the GitHub Release (required for electron-updater auto-update).
      # --publish never: local build only (artifact upload, no release).
      - name: Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_GH_IGNORE_TIME: true
        run: |
          TAG=${{ inputs.tag != '' && inputs.tag || format('desktop-v{0}', steps.version.outputs.version) }}
          if [ "${{ inputs.publish }}" = "true" ]; then
            cd desktop && npx electron-builder --${{ matrix.platform }} --publish always
          else
            cd desktop && npm run dist:${{ matrix.platform }}
          fi
        shell: bash

      # Upload artifacts (always, even if not publishing)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindos-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.yml
            desktop/dist/*.yaml
          if-no-files-found: warn
