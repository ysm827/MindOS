name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: false
      tag:
        description: 'Tag to build (for release name, e.g. desktop-v0.1.0)'
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: universal
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # macOS: import Developer ID certificate for code signing + notarization
      - name: Import Apple certificate
        if: matrix.platform == 'mac'
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE_BASE64" ]; then
            echo "No certificate configured, skipping code signing setup"
            exit 0
          fi
          CERT_FILE=$(mktemp /tmp/cert.XXXXXX.p12)
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERT_FILE"
          KEYCHAIN_FILE="/tmp/mindos-build-$$.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_FILE"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          # Try with provided password first, fall back to empty password
          if ! security import "$CERT_FILE" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE" 2>/dev/null; then
            echo "Retrying certificate import with empty password..."
            security import "$CERT_FILE" -P "" -A -t cert -f pkcs12 -k "$KEYCHAIN_FILE"
          fi
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_FILE"
          security list-keychains -d user -s "$KEYCHAIN_FILE" $(security list-keychains -d user | tr -d '"')
          rm "$CERT_FILE"

      # Windows: recursively remove all NTFS junction points in user profile
      # to prevent webpack glob EPERM errors during Next.js standalone build
      - name: Fix Windows NTFS junctions
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $queue = [System.Collections.Generic.Queue[string]]::new()
          $queue.Enqueue($env:USERPROFILE)
          $removed = 0
          while ($queue.Count -gt 0) {
            $dir = $queue.Dequeue()
            try {
              foreach ($entry in [System.IO.Directory]::GetFileSystemEntries($dir)) {
                $attrs = [System.IO.File]::GetAttributes($entry)
                if ($attrs -band [System.IO.FileAttributes]::ReparsePoint) {
                  [System.IO.Directory]::Delete($entry)
                  $removed++
                } elseif ($attrs -band [System.IO.FileAttributes]::Directory) {
                  $queue.Enqueue($entry)
                }
              }
            } catch { }
          }
          Write-Host "Removed $removed NTFS junction(s)"

      # Install all dependencies (app + mcp + desktop)
      - name: Install dependencies
        run: |
          cd app && npm install && cd ..
          cd mcp && npm install && cd ..
          cd desktop && npm install

      # Build Next.js standalone (required by prepare-mindos-runtime)
      - name: Build MindOS (Next.js standalone)
        run: |
          node scripts/gen-renderer-index.js
          cd app && npx next build --webpack

      # Build Electron (compile TS → JS)
      - name: Build Electron
        run: cd desktop && npm run build

      # Bundle MindOS runtime into desktop resources
      - name: Prepare bundled runtime
        run: cd desktop && npm run prepare-mindos-runtime

      # Get version (needed for tag name)
      - name: Get version
        id: version
        run: |
          VERSION=$(cd desktop && node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      # Package for the target platform.
      # When publishing: electron-builder --publish always uploads to a GitHub Release
      # named after package.json version (e.g. v0.1.0). We set EP_DRAFT=false so the
      # release is immediately visible. The finalize job renames/edits it if needed.
      - name: Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_GH_IGNORE_TIME: true
          EP_DRAFT: false
          # macOS notarization (only when secrets are configured)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ inputs.publish }}" = "true" ]; then
            cd desktop && npx electron-builder --${{ matrix.platform }} --publish always
          else
            cd desktop && npm run dist:${{ matrix.platform }}
          fi
        shell: bash

      # Upload artifacts (always, even if not publishing)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindos-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.yml
            desktop/dist/*.yaml
          if-no-files-found: warn

  # After all platforms finish: upload to CDN mirrors + finalize GitHub Release
  finalize:
    if: inputs.publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(cd desktop && node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Download all platform artifacts into a single directory
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # ── Cloudflare R2 upload (international CDN) ──
      - name: Upload to Cloudflare R2
        if: env.R2_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for file in artifacts/*.dmg artifacts/*.zip artifacts/*.exe artifacts/*.AppImage artifacts/*.deb; do
            [ -f "$file" ] || continue
            BASENAME=$(basename "$file")
            # Versioned path
            aws s3 cp "$file" "s3://mindos-releases/desktop/v${VERSION}/${BASENAME}" \
              --endpoint-url "$R2_ENDPOINT" --no-progress
            # Latest path (overwrite)
            aws s3 cp "$file" "s3://mindos-releases/desktop/latest/${BASENAME}" \
              --endpoint-url "$R2_ENDPOINT" --no-progress
          done
          echo "✅ Uploaded to Cloudflare R2: desktop/v${VERSION}/ + desktop/latest/"

      # ── Alibaba Cloud OSS upload (China CDN) ──
      - name: Upload to Alibaba Cloud OSS
        if: env.OSS_ACCESS_KEY_ID != ''
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          # Install ossutil
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | bash
          ossutil config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"

          VERSION="${{ steps.version.outputs.version }}"
          for file in artifacts/*.dmg artifacts/*.zip artifacts/*.exe artifacts/*.AppImage artifacts/*.deb; do
            [ -f "$file" ] || continue
            BASENAME=$(basename "$file")
            # Versioned path
            ossutil cp "$file" "oss://${OSS_BUCKET}/desktop/v${VERSION}/${BASENAME}" -f
            # Latest path (overwrite)
            ossutil cp "$file" "oss://${OSS_BUCKET}/desktop/latest/${BASENAME}" -f
          done
          echo "✅ Uploaded to Alibaba Cloud OSS: desktop/v${VERSION}/ + desktop/latest/"

      # ── Finalize GitHub Release ──
      - name: Finalize release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EB_TAG="v${{ steps.version.outputs.version }}"
          DESIRED_TAG=${{ inputs.tag != '' && inputs.tag || format('desktop-v{0}', steps.version.outputs.version) }}

          if [ "$EB_TAG" != "$DESIRED_TAG" ]; then
            git tag "$DESIRED_TAG" 2>/dev/null || true
            git push origin "$DESIRED_TAG" 2>/dev/null || true

            if gh release view "$EB_TAG" >/dev/null 2>&1; then
              gh release edit "$EB_TAG" \
                --tag "$DESIRED_TAG" \
                --title "MindOS Desktop $DESIRED_TAG" \
                --draft=false \
                --latest
            fi
          else
            if gh release view "$EB_TAG" >/dev/null 2>&1; then
              gh release edit "$EB_TAG" --draft=false --latest
            fi
          fi
