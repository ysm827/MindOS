name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: false
      tag:
        description: 'Tag to build (for release name, e.g. desktop-v0.1.0)'
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: universal
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install all dependencies (app + mcp + desktop)
      - name: Install dependencies
        run: |
          cd app && npm install && cd ..
          cd mcp && npm install && cd ..
          cd desktop && npm install

      # Build Next.js standalone (required by prepare-mindos-runtime)
      - name: Build MindOS (Next.js standalone)
        run: |
          node scripts/gen-renderer-index.js
          cd app && npx next build

      # Build Electron (compile TS → JS)
      - name: Build Electron
        run: cd desktop && npm run build

      # Bundle MindOS runtime into desktop resources
      - name: Prepare bundled runtime
        run: cd desktop && npm run prepare-mindos-runtime

      # Package for the target platform
      - name: Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd desktop && npm run dist:${{ matrix.platform }}

      # Upload artifacts (always, even if not publishing)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindos-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          if-no-files-found: warn

      # Collect version info
      - name: Get version
        id: version
        run: |
          VERSION=$(cd desktop && node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      # Publish to GitHub Releases
      - name: Publish to GitHub Releases
        if: inputs.publish == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag != '' && inputs.tag || format('desktop-v{0}', steps.version.outputs.version) }}
          name: ${{ inputs.tag != '' && inputs.tag || format('desktop-v{0}', steps.version.outputs.version) }}
          files: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.deb
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
