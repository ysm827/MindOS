name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: false
      tag:
        description: 'Tag to build (for release name, e.g. desktop-v0.1.0)'
        type: string
        required: false
        default: ''
      sign_mac:
        description: 'Sign and notarize macOS builds'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: macos-latest
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Windows: redirect USERPROFILE to prevent webpack from scanning protected
      # system directories (INetCache, WindowsApps, etc.) that cause EPERM errors.
      # This is the only reliable fix — deleting these dirs fails because they are
      # OS-protected, and outputFileTracingExcludes doesn't affect compile-time glob.
      - name: Fix Windows filesystem issues
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Create a clean home directory inside the workspace
          $safeHome = Join-Path $env:GITHUB_WORKSPACE '.home'
          New-Item -ItemType Directory -Path $safeHome -Force | Out-Null

          # Copy essential dotfiles (npm config, etc.) but skip AppData
          if (Test-Path (Join-Path $env:USERPROFILE '.npmrc')) {
            Copy-Item (Join-Path $env:USERPROFILE '.npmrc') $safeHome -ErrorAction SilentlyContinue
          }

          # Redirect all home-related env vars for subsequent steps
          echo "USERPROFILE=$safeHome" >> $env:GITHUB_ENV
          echo "HOME=$safeHome" >> $env:GITHUB_ENV
          echo "LOCALAPPDATA=$safeHome\AppData\Local" >> $env:GITHUB_ENV
          echo "APPDATA=$safeHome\AppData\Roaming" >> $env:GITHUB_ENV
          New-Item -ItemType Directory -Path "$safeHome\AppData\Local" -Force | Out-Null
          New-Item -ItemType Directory -Path "$safeHome\AppData\Roaming" -Force | Out-Null

          # Strip WindowsApps from PATH
          $cleanPath = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'WindowsApps' }) -join ';'
          echo "PATH=$cleanPath" >> $env:GITHUB_ENV

          Write-Host "Redirected USERPROFILE to $safeHome"

      # Install all dependencies (app + mcp + desktop)
      - name: Install dependencies
        run: |
          cd app && npm install && cd ..
          cd mcp && npm install && cd ..
          cd desktop && npm install

      # Build Next.js standalone (required by prepare-mindos-runtime)
      - name: Build MindOS (Next.js standalone)
        run: |
          node scripts/gen-renderer-index.js
          cd app && npx next build --webpack

      # Build Electron (compile TS → JS)
      - name: Build Electron
        run: cd desktop && npm run build

      # Bundle MindOS runtime + Node.js into desktop resources
      - name: Prepare bundled runtime
        env:
          MINDOS_BUNDLE_NODE_ARCH: ${{ matrix.arch }}
        run: cd desktop && npm run prepare-mindos-runtime

      # Get version (needed for tag name)
      - name: Get version
        id: version
        run: |
          VERSION=$(cd desktop && node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      # Package for the target platform.
      # When publishing: electron-builder --publish always uploads to a GitHub Release
      # named after package.json version (e.g. v0.1.0). We set EP_DRAFT=false so the
      # release is immediately visible. The finalize job renames/edits it if needed.

      # macOS: decode App Store Connect API Key (.p8) for notarization
      - name: Prepare Apple API Key
        if: matrix.platform == 'mac' && inputs.sign_mac == true
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          if [ -z "$APPLE_API_KEY_BASE64" ] || [ -z "$APPLE_API_KEY_ID" ]; then
            echo "API Key not configured, skipping (will fall back to Apple ID notarization)"
            exit 0
          fi
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          echo "✅ API Key written to ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"

      - name: Package (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_GH_IGNORE_TIME: true
          EP_DRAFT: false
        run: |
          # macOS: set signing env vars (notarization is a separate step)
          if [ "${{ matrix.platform }}" = "mac" ] && [ "${{ inputs.sign_mac }}" = "true" ]; then
            export CSC_LINK="${{ secrets.APPLE_CERTIFICATE_BASE64 }}"
            export CSC_KEY_PASSWORD="${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            export ELECTRON_BUILDER_SKIP_NOTARIZE=true
          elif [ "${{ matrix.platform }}" = "mac" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi

          if [ "${{ inputs.publish }}" = "true" ]; then
            cd desktop && npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish always
          else
            cd desktop && npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never
          fi
        shell: bash

      # macOS: notarize DMG files with retry logic
      - name: Notarize macOS builds
        if: matrix.platform == 'mac' && inputs.sign_mac == true
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Determine notarization auth method (array avoids word-splitting issues)
          if [ -f ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 ] && [ -n "$APPLE_API_KEY_ID" ]; then
            AUTH_ARGS=(--key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER")
            echo "Using API Key authentication"
          elif [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            AUTH_ARGS=(--apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID")
            echo "Using Apple ID authentication"
          else
            echo "No notarization credentials configured, skipping"
            exit 0
          fi

          notarize_file() {
            local file="$1"
            local max_retries=3
            local retry=0
            echo "Notarizing: $(basename "$file")"
            while [ $retry -lt $max_retries ]; do
              retry=$((retry + 1))
              echo "  Attempt $retry/$max_retries..."
              xcrun notarytool submit "$file" "${AUTH_ARGS[@]}" --wait --timeout 2h 2>&1 | tee /tmp/notarize.log
              if grep -q "status: Accepted" /tmp/notarize.log; then
                echo "  Notarized: $(basename "$file")"
                return 0
              fi
              if [ $retry -lt $max_retries ]; then
                echo "  Failed, retrying in 30s..."
                sleep 30
              fi
            done
            echo "  Failed after $max_retries attempts: $(basename "$file")"
            cat /tmp/notarize.log
            return 1
          }

          FAILED=0
          for file in desktop/dist/*.dmg; do
            [ -f "$file" ] || continue
            notarize_file "$file" || FAILED=1
          done
          [ $FAILED -eq 0 ] || exit 1
        shell: bash

      # macOS: staple notarization tickets to DMG files
      - name: Staple notarization tickets
        if: matrix.platform == 'mac' && inputs.sign_mac == true
        run: |
          for file in desktop/dist/*.dmg; do
            [ -f "$file" ] || continue
            echo "📎 Stapling: $(basename "$file")"
            xcrun stapler staple "$file"
            echo "  ✅ Stapled: $(basename "$file")"
          done
        shell: bash

      # Upload artifacts (always, even if not publishing)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindos-desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.exe
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/*.yml
            desktop/dist/*.yaml
          if-no-files-found: warn

  # After all platforms finish: upload to CDN mirrors + finalize GitHub Release
  finalize:
    if: inputs.publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(cd desktop && node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Download all platform artifacts into a single directory
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # ── Cloudflare R2 upload (optional, non-blocking) ──
      - name: Upload to Cloudflare R2
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "R2 not configured, skipping"
            exit 0
          fi
          VERSION="${{ steps.version.outputs.version }}"
          # Strip version from filename for CDN latest/ path so landing page URLs stay fixed.
          # e.g. "MindOS-0.1.0-arm64.dmg" → "MindOS-arm64.dmg"
          #      "MindOS Setup 0.1.0.exe" → "MindOS-Setup.exe"
          #      "MindOS-0.1.0.AppImage"  → "MindOS.AppImage"
          strip_version() {
            echo "$1" | sed "s/-${VERSION}//g; s/ ${VERSION}//g; s/ /-/g"
          }
          for file in artifacts/*.dmg artifacts/*.zip artifacts/*.exe artifacts/*.AppImage artifacts/*.deb; do
            [ -f "$file" ] || continue
            BASENAME=$(basename "$file")
            LATEST_NAME=$(strip_version "$BASENAME")
            # Versioned path (original filename)
            aws s3 cp "$file" "s3://mindos-releases/desktop/v${VERSION}/${BASENAME}" \
              --endpoint-url "$R2_ENDPOINT" --no-progress
            # Latest path (version-stripped filename)
            aws s3 cp "$file" "s3://mindos-releases/desktop/latest/${LATEST_NAME}" \
              --endpoint-url "$R2_ENDPOINT" --no-progress
          done
          echo "✅ Uploaded to Cloudflare R2: desktop/v${VERSION}/ + desktop/latest/"

      # ── Alibaba Cloud OSS upload (optional, non-blocking) ──
      - name: Upload to Alibaba Cloud OSS
        continue-on-error: true
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then
            echo "OSS not configured, skipping"
            exit 0
          fi
          # Install ossutil to user-local path (no sudo needed)
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | bash -s -- --install-dir "$HOME/.local/bin"
          export PATH="$HOME/.local/bin:$PATH"
          ossutil config -e "$OSS_ENDPOINT" -i "$OSS_ACCESS_KEY_ID" -k "$OSS_ACCESS_KEY_SECRET"

          VERSION="${{ steps.version.outputs.version }}"
          strip_version() {
            echo "$1" | sed "s/-${VERSION}//g; s/ ${VERSION}//g; s/ /-/g"
          }
          for file in artifacts/*.dmg artifacts/*.zip artifacts/*.exe artifacts/*.AppImage artifacts/*.deb; do
            [ -f "$file" ] || continue
            BASENAME=$(basename "$file")
            LATEST_NAME=$(strip_version "$BASENAME")
            # Versioned path (original filename)
            ossutil cp "$file" "oss://${OSS_BUCKET}/desktop/v${VERSION}/${BASENAME}" -f
            # Latest path (version-stripped filename)
            ossutil cp "$file" "oss://${OSS_BUCKET}/desktop/latest/${LATEST_NAME}" -f
          done
          echo "✅ Uploaded to Alibaba Cloud OSS: desktop/v${VERSION}/ + desktop/latest/"

      # ── Finalize GitHub Release ──
      - name: Finalize release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EB_TAG="v${{ steps.version.outputs.version }}"
          DESIRED_TAG=${{ inputs.tag != '' && inputs.tag || format('desktop-v{0}', steps.version.outputs.version) }}

          if [ "$EB_TAG" != "$DESIRED_TAG" ]; then
            git tag "$DESIRED_TAG" 2>/dev/null || true
            git push origin "$DESIRED_TAG" 2>/dev/null || true

            if gh release view "$EB_TAG" >/dev/null 2>&1; then
              gh release edit "$EB_TAG" \
                --tag "$DESIRED_TAG" \
                --title "MindOS Desktop $DESIRED_TAG" \
                --draft=false \
                --latest
            fi
          else
            if gh release view "$EB_TAG" >/dev/null 2>&1; then
              gh release edit "$EB_TAG" --draft=false --latest
            fi
          fi
