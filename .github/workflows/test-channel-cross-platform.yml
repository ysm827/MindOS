name: Test Channel Cross Platform

on:
  pull_request:
    paths:
      - 'bin/commands/channel.js'
      - 'bin/lib/channel-*.js'
      - 'app/app/api/channels/verify/route.ts'
      - 'app/lib/im/config.ts'
      - 'app/lib/im/verify.ts'
      - 'app/lib/im/adapters/dingtalk.ts'
      - 'app/lib/im/adapters/qq.ts'
      - 'app/lib/im/adapters/wechat.ts'
      - 'app/__tests__/channel-*.test.*'
      - 'app/__tests__/api/channels-verify.test.ts'
      - 'app/__tests__/im/dingtalk.test.ts'
      - 'app/__tests__/im/qq.test.ts'
      - 'app/__tests__/im/wechat.test.ts'
      - 'app/vitest.config.ts'
      - 'app/package.json'
      - '.github/workflows/test-channel-cross-platform.yml'
  workflow_dispatch:

jobs:
  channel-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install app dependencies
        run: cd app && npm ci --no-workspaces

      - name: Run channel typecheck
        run: cd app && npm run typecheck

      - name: Run channel regression tests
        run: >-
          cd app &&
          npx vitest run
          __tests__/channel-cli-layers.test.ts
          __tests__/channel-command-env.test.ts
          __tests__/channel-mgmt.test.js
          __tests__/channel-prompts.test.ts
          __tests__/channel-cli-subprocess.test.ts
          __tests__/api/channels-verify.test.ts
          __tests__/im/dingtalk.test.ts
          __tests__/im/qq.test.ts
          __tests__/im/wechat.test.ts
