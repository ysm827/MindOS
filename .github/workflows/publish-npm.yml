name: Publish to npm

# Only triggered via workflow_dispatch from sync-to-mindos pipeline.
# Do NOT add push/tags trigger — PAT-pushed tags also fire it, causing
# duplicate publish attempts (first succeeds, second gets 403).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to publish'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG="${{ steps.tag.outputs.tag }}"
          echo "Package: ${PKG_VERSION} | Tag: ${TAG}"
          if [ "${PKG_VERSION}" != "${TAG}" ]; then
            echo "::error::Version mismatch: ${PKG_VERSION} vs ${TAG}"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
