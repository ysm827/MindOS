name: Publish to npm

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.5.32)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install MCP build dependencies
        run: cd mcp && npm install

      - name: Build standalone package
        run: |
          cd mcp && npm install --include=dev && npm run build && cd ..
          cd app && npm install --no-workspaces && ./node_modules/.bin/next build --webpack && cd ..
          node scripts/prepare-standalone.mjs

      - name: Clean build artifacts before publish
        run: |
          rm -rf app/node_modules app/.next mcp/node_modules _standalone/node_modules node_modules
          echo "=== Checking tarball size ==="
          npm pack --dry-run 2>&1 | tail -5

      - name: Publish to npm
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Ensure latest tag points to this version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Setting latest dist-tag to ${VERSION}..."
          npm dist-tag add "@geminilight/mindos@${VERSION}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
