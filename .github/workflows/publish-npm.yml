name: Publish to npm (fallback)

# Primary npm publish happens on GeminiLight/MindOS (public repo).
# This is manual-only fallback. The standard publish-npm.yml is synced
# to the public repo by sync-to-mindos.yml.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.5.32)'
        required: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install MCP build dependencies
        run: cd mcp && npm install

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Ensure latest tag points to this version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Setting latest dist-tag to ${VERSION}..."
          npm dist-tag add "@geminilight/mindos@${VERSION}" latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
