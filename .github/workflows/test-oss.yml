name: Test OSS Upload

on:
  workflow_dispatch:

jobs:
  test-oss:
    runs-on: ubuntu-latest
    steps:
      - name: Test Alibaba Cloud OSS Upload
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
        run: |
          echo "=== OSS Upload Test ==="
          echo "Bucket: $OSS_BUCKET"
          echo "Endpoint: $OSS_ENDPOINT"

          # Check secrets are set
          if [ -z "$OSS_ACCESS_KEY_ID" ]; then echo "ERROR: OSS_ACCESS_KEY_ID not set"; exit 1; fi
          if [ -z "$OSS_ACCESS_KEY_SECRET" ]; then echo "ERROR: OSS_ACCESS_KEY_SECRET not set"; exit 1; fi
          if [ -z "$OSS_ENDPOINT" ]; then echo "ERROR: OSS_ENDPOINT not set"; exit 1; fi
          if [ -z "$OSS_BUCKET" ]; then echo "ERROR: OSS_BUCKET not set"; exit 1; fi

          # Check endpoint format
          if [[ "$OSS_ENDPOINT" == https://* ]]; then
            echo "ERROR: OSS_ENDPOINT should NOT have https:// prefix"
            echo "Current: $OSS_ENDPOINT"
            echo "Should be: oss-cn-hangzhou.aliyuncs.com"
            exit 1
          fi
          echo "Endpoint format OK"

          # Create test file
          OBJECT_KEY="ci-test-$(date +%s).txt"
          echo "hello from GitHub Actions at $(date -u)" > /tmp/test.txt

          # Upload via curl + OSS REST API signing
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")
          RESOURCE="/${OSS_BUCKET}/${OBJECT_KEY}"
          STRING_TO_SIGN="PUT\n\ntext/plain\n${DATE}\n${RESOURCE}"
          SIGNATURE=$(printf "$STRING_TO_SIGN" | openssl dgst -sha1 -hmac "$OSS_ACCESS_KEY_SECRET" -binary | base64)
          URL="https://${OSS_BUCKET}.${OSS_ENDPOINT}/${OBJECT_KEY}"

          echo ""
          echo "1. Uploading to: $URL"
          HTTP_CODE=$(curl -s -o /tmp/oss-resp.txt -w "%{http_code}" \
            -X PUT \
            -H "Date: ${DATE}" \
            -H "Content-Type: text/plain" \
            -H "Authorization: OSS ${OSS_ACCESS_KEY_ID}:${SIGNATURE}" \
            -T /tmp/test.txt \
            "$URL")

          echo "   HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "   FAILED - Response:"
            cat /tmp/oss-resp.txt
            exit 1
          fi
          echo "   Upload OK"

          # Public read test
          echo ""
          echo "2. Public access test:"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "   HTTP: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "   Public read OK"
          else
            echo "   Public read FAILED - bucket ACL may not be public-read"
          fi

          # Cleanup
          echo ""
          echo "3. Cleanup..."
          DATE=$(date -u +"%a, %d %b %Y %H:%M:%S GMT")
          STRING_TO_SIGN="DELETE\n\n\n${DATE}\n${RESOURCE}"
          SIGNATURE=$(printf "$STRING_TO_SIGN" | openssl dgst -sha1 -hmac "$OSS_ACCESS_KEY_SECRET" -binary | base64)
          curl -s -o /dev/null \
            -X DELETE \
            -H "Date: ${DATE}" \
            -H "Authorization: OSS ${OSS_ACCESS_KEY_ID}:${SIGNATURE}" \
            "$URL"
          echo "   Cleaned up"

          echo ""
          echo "=== ALL TESTS PASSED ==="
