name: Sync to MindOS

# Trigger on:
# - push to main (code changes)
# - version tags (to sync tag → public repo → npm publish)
# - manual dispatch
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
      - 'desktop-v*'
    paths:
      - 'app/**'
      - 'mcp/**'
      - 'desktop/**'
      - 'shared/**'
      - 'skills/**'
      - 'templates/**'
      - 'assets/**'
      - 'landing/**'
      - 'docs/**'
      - 'bin/**'
      - 'scripts/**'
      - 'tests/**'
      - 'wiki/**'
      - '.github/workflows/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'README_zh.md'
      - '.env.local.example'
      - 'package.json'
      - 'package-lock.json'
      # Internal/private wiki content — do not sync to public mindos repo.
      # Use negative patterns here because GitHub Actions does not allow
      # combining `paths` and `paths-ignore` in the same push trigger.
      - '!wiki/0*.md'
      - '!wiki/specs/**'
      - '!wiki/discussions/**'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mindos-dev
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to mindos repo
        env:
          PAT: ${{ secrets.MINDOS_SYNC_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config --global user.name "GeminiLight"
          git config --global user.email "wtfly2018@163.com"

          # Ensure push to current repo (mindos-dev) uses GitHub Actions token.
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          # === 1. Deploy landing/ to mindos-dev gh-pages ===
          if [ -d landing ]; then
            git subtree split --prefix landing -b gh-pages-tmp
            git push origin gh-pages-tmp:gh-pages --force
            git branch -D gh-pages-tmp
          else
            echo "No landing/ directory — skipping gh-pages deploy to mindos-dev."
          fi

          # PAT is required for cross-repo sync/publish to GeminiLight/mindos.
          if [ -z "${PAT:-}" ]; then
            echo "::error::Missing secret MINDOS_SYNC_TOKEN."
            echo "::error::Set repo secret MINDOS_SYNC_TOKEN with repo write access to GeminiLight/mindos and GeminiLight/mindos-dev."
            exit 1
          fi

          # === 2. Sync to mindos main branch ===
          git clone --depth 1 "https://x-access-token:${PAT}@github.com/GeminiLight/mindos.git" /tmp/mindos || {
            echo "Target repo not found or token has no access: GeminiLight/mindos"
            exit 1
          }

          # Clean slate: remove everything except .git so only explicitly
          # synced content remains. Prevents stale private files from persisting.
          find /tmp/mindos -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          rsync -av --delete --exclude='node_modules' --exclude='.next' app/ /tmp/mindos/app/
          rsync -av --delete --exclude='node_modules' mcp/ /tmp/mindos/mcp/
          [ -d desktop/ ] && rsync -av --delete --exclude='node_modules' --exclude='dist' --exclude='dist-electron' --exclude='dist-renderer' desktop/ /tmp/mindos/desktop/
          [ -d shared/ ] && rsync -av --delete --exclude='dist' shared/ /tmp/mindos/shared/
          [ -d skills/ ] && rsync -av --delete --exclude='node_modules' skills/ /tmp/mindos/skills/
          [ -d templates/ ] && rsync -av --delete templates/ /tmp/mindos/templates/
          [ -d assets/ ] && rsync -av --delete assets/ /tmp/mindos/assets/
          [ -d bin/ ] && rsync -av --delete bin/ /tmp/mindos/bin/
          [ -d scripts/ ] && rsync -av --delete scripts/ /tmp/mindos/scripts/
          [ -d tests/ ] && rsync -av --delete tests/ /tmp/mindos/tests/
          [ -d docs/ ] && rsync -av --delete docs/ /tmp/mindos/docs/

          # Sync CI workflows — only specific files, skip private-repo-only ones
          mkdir -p /tmp/mindos/.github/workflows
          for wf in .github/workflows/*.yml; do
            wf_name=$(basename "$wf")
            case "$wf_name" in
              sync-to-mindos.yml|ci.yml) continue ;;
            esac
            cp "$wf" /tmp/mindos/.github/workflows/
          done
          # Remove excluded workflows that may have been synced before exclusions existed
          for excluded_wf in sync-to-mindos.yml ci.yml; do
            rm -f /tmp/mindos/.github/workflows/$excluded_wf
          done
          # wiki/0*.md、wiki/specs、wiki/discussions — dev-only; not copied to GeminiLight/mindos
          [ -d wiki/ ] && rsync -av --delete \
            --exclude='0*.md' \
            --exclude='specs/' \
            --exclude='discussions/' \
            --exclude='85-backlog.md' \
            --exclude='project-status-report.md' \
            --exclude='implementation-roadmap.md' \
            --exclude='architecture-review-summary.md' \
            --exclude='ui-audit-*.md' \
            wiki/ /tmp/mindos/wiki/

          [ -f .gitignore.prod ] && cp .gitignore.prod /tmp/mindos/.gitignore

          for f in package.json package-lock.json README.md README_zh.md LICENSE AGENTS.md .env.local.example; do
            [ -f "$f" ] && cp "$f" /tmp/mindos/
          done

          # Preserve CLAUDE.md symlink
          [ -L "CLAUDE.md" ] && cp -P CLAUDE.md /tmp/mindos/

          # Get the latest commit message from mindos-dev
          DEV_MSG=$(git -C "$GITHUB_WORKSPACE" log -1 --format='%s')

          # If commit message is a bare version number (e.g. "0.1.8"),
          # append changelog from previous version tag.
          if echo "$DEV_MSG" | grep -qxE '[0-9]+\.[0-9]+\.[0-9]+'; then
            cd "$GITHUB_WORKSPACE"
            # pipefail + grep/head pipelines can exit non-zero; guard with || true
            CUR_TAG=$(git tag --points-at HEAD | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
            if [ -n "$CUR_TAG" ]; then
              PREV_TAG=$(git describe --tags --abbrev=0 "${CUR_TAG}^" 2>/dev/null || true)
            else
              PREV_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || true)
            fi
            if [ -n "$PREV_TAG" ]; then
              CHANGELOG=$(git log "${PREV_TAG}..HEAD~1" --format='- %s' | head -20 || true)
              if [ -n "$CHANGELOG" ]; then
                DEV_MSG=$(printf '%s\n\n%s' "$DEV_MSG" "$CHANGELOG")
              fi
            fi
          fi

          cd /tmp/mindos
          # landing/ is deployed to gh-pages only — remove from main if it exists
          rm -rf /tmp/mindos/landing
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
          else
            git commit -m "${DEV_MSG}"
            git push
          fi

          # === 3. Deploy landing/ to mindos gh-pages ===
          cd "$GITHUB_WORKSPACE"
          if [ -d landing ]; then
            if git clone --depth 1 -b gh-pages "https://x-access-token:${PAT}@github.com/GeminiLight/mindos.git" /tmp/mindos-pages 2>/dev/null; then
              echo "Cloned existing gh-pages branch."
            else
              # gh-pages branch doesn't exist yet — create an orphan branch
              mkdir -p /tmp/mindos-pages
              cd /tmp/mindos-pages
              git init
              git remote add origin "https://x-access-token:${PAT}@github.com/GeminiLight/mindos.git"
              git checkout --orphan gh-pages
            fi

            cd "$GITHUB_WORKSPACE"
            rsync -av --delete --exclude='.git' landing/ /tmp/mindos-pages/

            cd /tmp/mindos-pages
            git add -A
            if git diff --cached --quiet; then
              echo "No landing changes to deploy."
            else
              git commit -m "deploy: ${DEV_MSG}"
              git push origin gh-pages
            fi
          else
            echo "No landing/ directory — skipping gh-pages deploy to mindos."
          fi

          # === 4. Sync version tag to public repo + trigger workflows ===
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF_NAME}"
            echo "Syncing tag ${TAG} to public repo..."
            cd /tmp/mindos
            git fetch origin --tags 2>/dev/null || true
            # Only push if tag doesn't already exist on public
            if ! git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
              git tag "${TAG}"
              git push origin "${TAG}"
              echo "✅ Tag ${TAG} pushed to GeminiLight/MindOS"
            else
              echo "Tag ${TAG} already exists on public repo, skipping."
            fi

            if [[ "${TAG}" == desktop-v* ]]; then
              # Desktop tag → trigger desktop build workflow
              echo "Triggering desktop build workflow on GeminiLight/MindOS..."
              curl -sf -X POST \
                -H "Authorization: token ${PAT}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/GeminiLight/MindOS/actions/workflows/build-desktop.yml/dispatches" \
                -d "{\"ref\":\"main\"}" \
                && echo "✅ Desktop build dispatched for ${TAG}" \
                || echo "⚠️ Failed to dispatch desktop build — check PAT permissions"
            elif [[ "${TAG}" == v* ]]; then
              # npm version tag → trigger npm publish
              echo "Triggering npm publish workflow on GeminiLight/MindOS..."
              curl -sf -X POST \
                -H "Authorization: token ${PAT}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/GeminiLight/MindOS/actions/workflows/publish-npm.yml/dispatches" \
                -d "{\"ref\":\"main\",\"inputs\":{\"tag\":\"${TAG}\"}}" \
                && echo "✅ Publish workflow dispatched for ${TAG}" \
                || echo "⚠️ Failed to dispatch publish workflow — check PAT permissions"

              # Mark npm release as pre-release so Desktop release stays "Latest"
              # (GitHub auto-creates a release from the tag push; wait a moment for it)
              sleep 5
              curl -sf -X PATCH \
                -H "Authorization: token ${PAT}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/GeminiLight/MindOS/releases/tags/${TAG}" \
                -d '{"prerelease":true}' \
                && echo "✅ Marked ${TAG} as pre-release" \
                || echo "⚠️ Could not mark ${TAG} as pre-release (release may not exist yet)"
            fi
          fi
